name: Bug Report
description: Report a problem with the analysis notebook or outputs
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much detail as possible.

  - type: input
    id: cell_number
    attributes:
      label: Notebook Cell Number
      description: Which cell produced the error?
      placeholder: "e.g., Cell 13 — Zonal Statistics"
    validations:
      required: true

  - type: textarea
    id: error_message
    attributes:
      label: Error Message
      description: Paste the full error traceback here
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `pip show geopandas rasterio rasterstats shapely`
      render: shell
    validations:
      required: true

  - type: textarea
    id: input_description
    attributes:
      label: Input Data Description
      description: |
        Describe your input data (you do not need to share the files):
        - CRS of your rasters and shapefiles
        - Column names in your settlement shapefile
        - Approximate study area and dam name
    validations:
      required: false

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: What did you do before the error occurred?
    validations:
      required: true
