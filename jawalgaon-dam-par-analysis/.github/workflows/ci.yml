name: Notebook Lint & Dependency Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nbformat nbconvert jupyter

      - name: Validate notebook structure
        run: |
          python - <<'EOF'
          import nbformat, sys

          nb_path = "notebooks/Jawalgaon_PAR_Complete.ipynb"
          with open(nb_path) as f:
              nb = nbformat.read(f, as_version=4)

          cells = nb.cells
          print(f"✅ Notebook loaded: {len(cells)} cells")

          # Check notebook has expected number of cells
          assert len(cells) >= 40, f"Expected ≥40 cells, got {len(cells)}"

          # Check first cell is markdown with title
          assert cells[0].cell_type == "markdown", "Cell 0 must be markdown"
          assert "JAWALGAON" in cells[0].source.upper(), "Cell 0 must contain JAWALGAON"

          print("✅ Notebook structure validated")
          EOF

      - name: Check requirements.txt is valid
        run: |
          pip install -r requirements.txt --dry-run

      - name: Check markdown files exist
        run: |
          for f in README.md METHODOLOGY.md DATA_DICTIONARY.md CONTRIBUTING.md CHANGELOG.md; do
            [ -f "$f" ] && echo "✅ $f present" || (echo "❌ $f missing" && exit 1)
          done
