<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="100%">
  <rect width="800" height="150" fill="#2d3436"/>
  
  <path d="M 150 75 L 650 75" stroke="#636e72" stroke-width="2" stroke-dasharray="10,10">
     <animate attributeName="stroke-dashoffset" values="0; 40" dur="2s" repeatCount="indefinite" />
  </path>
  
  <circle cx="150" cy="75" r="12" fill="#00b894">
    <animate attributeName="r" values="12; 18; 12" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1; 0.6; 1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="650" cy="75" r="12" fill="#0984e3">
    <animate attributeName="r" values="12; 18; 12" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1; 0.6; 1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <text x="400" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="bold" fill="#dfe6e9" text-anchor="middle">Data Dictionary</text>
</svg>
