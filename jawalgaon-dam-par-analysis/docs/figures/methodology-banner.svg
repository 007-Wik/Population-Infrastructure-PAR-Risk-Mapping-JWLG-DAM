<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="100%">
  <rect width="800" height="150" fill="#1e272e"/>
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#485460" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="150" fill="url(#grid)"/>
  
  <line x1="0" y1="0" x2="800" y2="0" stroke="#0fbcf9" stroke-width="2" opacity="0.8">
    <animate attributeName="y1" values="0;150;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;150;0" dur="4s" repeatCount="indefinite"/>
  </line>

  <text x="400" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">Methodology &amp; Pipeline</text>
</svg>
