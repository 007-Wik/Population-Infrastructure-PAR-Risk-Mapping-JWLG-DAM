<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027" />
      <stop offset="50%" stop-color="#203a43" />
      <stop offset="100%" stop-color="#2c5364" />
    </linearGradient>
    <path id="wave1" d="M 0 100 C 200 70, 200 130, 400 100 C 600 70, 600 130, 800 100 L 800 200 L 0 200 Z" fill="rgba(0, 168, 255, 0.3)"/>
    <path id="wave2" d="M 0 110 C 200 140, 200 80, 400 110 C 600 140, 600 80, 800 110 L 800 200 L 0 200 Z" fill="rgba(0, 151, 230, 0.4)"/>
  </defs>
  <rect width="800" height="200" fill="url(#bg)"/>
  
  <g>
    <use href="#wave1" x="0" y="30">
      <animateTransform attributeName="transform" type="translate" values="-800 0; 0 0" dur="12s" repeatCount="indefinite" />
    </use>
    <use href="#wave1" x="800" y="30">
      <animateTransform attributeName="transform" type="translate" values="-800 0; 0 0" dur="12s" repeatCount="indefinite" />
    </use>
    
    <use href="#wave2" x="0" y="50">
      <animateTransform attributeName="transform" type="translate" values="0 0; -800 0" dur="8s" repeatCount="indefinite" />
    </use>
    <use href="#wave2" x="800" y="50">
      <animateTransform attributeName="transform" type="translate" values="0 0; -800 0" dur="8s" repeatCount="indefinite" />
    </use>
  </g>

  <text x="400" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">Jawalgaon Dam Break</text>
  <text x="400" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#a4b0be" text-anchor="middle">Population At Risk (PAR) Analysis</text>
</svg>
